services:
  - type: web
    name: regushield-api-mike
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: regushield-db-mike
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: regushield-redis-mike
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOCARDLESS_ACCESS_TOKEN
        sync: false
      - key: PYTHONPATH
        value: /app

  - type: worker
    name: regushield-worker-mike
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: regushield-db-mike
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: regushield-redis-mike
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app

  - type: keyvalue
    name: regushield-redis-mike
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: regushield-db-mike
    plan: free
