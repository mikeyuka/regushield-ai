services:
  - type: web
    name: regushield-api-mike-v2
    runtime: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: regushield-db-mike-v2
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOCARDLESS_ACCESS_TOKEN
        sync: false
      - key: PYTHONPATH
        value: /app

databases:
  - name: regushield-db-mike-v2
    plan: basic-256mb
