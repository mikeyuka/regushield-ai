services:
  - type: web
    name: regushield-api-mike
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    preDeployCommand: python app/init_db.py
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: regushield-db-mike
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOCARDLESS_ACCESS_TOKEN
        sync: false
      - key: PYTHONPATH
        value: /app

databases:
  - name: regushield-db-mike
    plan: free
